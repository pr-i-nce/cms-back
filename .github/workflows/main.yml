name: Deploy CMS to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build & Prepare Modules
        run: |
          npm install
          npm run build
          # Keep only production modules to speed up upload
          rm -rf node_modules
          npm install --production

      - name: Prepare Deployment Files
        run: |
          mkdir -p deploy_package/tmp
          cp -r dist deploy_package/
          cp -r prisma deploy_package/
          cp -r node_modules deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/
          echo "${{ secrets.DOT_ENV }}" > deploy_package/.env
          touch deploy_package/tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./deploy_package/
          server-dir: ./DWH-CMS_BACK/
          delete-removed: flase
          exclude: |
            **/.git*
            **/.git*/**
