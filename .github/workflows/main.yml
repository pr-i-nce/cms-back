name: Deploy CMS to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Project
        run: |
          npm install
          npx prisma generate
          npm run build

      - name: Prepare Deployment Files
        run: |
          mkdir -p deploy_package/tmp
          cp -r dist deploy_package/
          cp -r prisma deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/
          echo "${{ secrets.DOT_ENV }}" > deploy_package/.env
          touch deploy_package/tmp/restart.txt
          # NOTE: We are NOT copying node_modules here to comply with CloudLinux rules

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./deploy_package/
          server-dir: ./DWH-CMS_BACK/
          # 'dangerous-clean-slate' replaces 'delete-removed' in v4.3.5
          # Set to true if you want to wipe old files on the server
          dangerous-clean-slate: false 
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
