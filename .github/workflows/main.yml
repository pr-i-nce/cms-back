name: Deploy CMS to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Project
        run: |
          npm install
          # Generate client for Linux environment specifically
          PRISMA_CLI_QUERY_ENGINE_TYPE=library npx prisma generate
          npm run build

      - name: Prepare Deployment Files
        run: |
          mkdir -p deploy_package/tmp
          cp -r dist deploy_package/
          cp -r prisma deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/
          
          # IMPORTANT: We only copy the GENERATED Prisma client. 
          # This allows the app to run without a full node_modules upload.
          mkdir -p deploy_package/node_modules/@prisma
          cp -r node_modules/@prisma/client deploy_package/node_modules/@prisma/
          
          echo "${{ secrets.DOT_ENV }}" > deploy_package/.env
          touch deploy_package/tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./deploy_package/
          server-dir: ./DWH-CMS_BACK/
          # Set to true to ensure old 'real' node_modules folders are wiped
          dangerous-clean-slate: true 
          exclude: |
            **/.git*
            **/.git*/**
            # We exclude node_modules EXCEPT the @prisma/client we manually copied
            node_modules/!( @prisma )
