name: Deploy CMS to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Prepare Deployment Files
        run: |
          mkdir deploy_package
          cp -r dist deploy_package/
          cp -r prisma deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/
          echo "${{ secrets.DOT_ENV }}" > deploy_package/.env

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./deploy_package/
          # Ensure this matches the path to your 'cms.church' folder relative to your FTP login root
          server-dir: ./cms.church/ 
          delete-removed: true
